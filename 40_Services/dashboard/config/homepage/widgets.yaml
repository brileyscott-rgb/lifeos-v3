---
# LifeOS Dashboard — Widget Configuration
# Custom API widgets for LifeOS service health monitoring

# Status API and Action API health widgets are configured inline in services.yaml.
# Additional widgets can be added here as Uptime Kuma and other
# observability services come online.

- resources:
    cpu: true
    memory: true
    disk: /

- datetime:
    text_size: xl
    format:
      timeStyle: short
      dateStyle: medium
      hour12: false

# Future widget ideas:
# - Uptime Kuma status summary (requires Uptime Kuma API or customapi widget)
# - Docker container status (requires Docker socket or custom script)
# - Capture queue summary (already inline via Status API widget)
# - Git dirty state (requires custom script endpoint)
