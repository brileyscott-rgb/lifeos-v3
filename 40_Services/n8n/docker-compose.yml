# Docker Compose V2+ supports the `name:` field. V1 users omit it.
# name: lifeos-n8n

x-lifeos-boundary:
  status: scaffold-only
  notes: >
    This compose file defines a local-only n8n instance for LifeOS V3.
    No public webhooks, tunnels, or reverse proxies are configured.
    Activation requires explicit review and approval.

services:
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    # env_file: .env  # removed for static validation; startup script enforces .env
    environment:
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: ${N8N_PORT:-5678}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-change_me}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:-change_me}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-America/Chicago}
      TZ: ${TZ:-America/Chicago}
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
      N8N_VERSION_NOTIFICATIONS_ENABLED: "false"
    networks:
      - lifeos_internal
    ports:
      - "127.0.0.1:${N8N_PORT:-5678}:5678"
    volumes:
      - n8n_data:/home/node/.n8n

  lifeos-action-api:
    build: ../action_api
    container_name: lifeos-action-api
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - lifeos_internal
    volumes:
      - ../../30_Capture:/lifeos/capture:rw
      - ../../50_Event_Log:/lifeos/event-log:rw

volumes:
  n8n_data:

networks:
  lifeos_internal:
    external: true
