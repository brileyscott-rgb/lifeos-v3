# LEGACY/REFERENCE: A unified compose file now exists at
#   40_Services/compose/lifeos.yaml
# This file is preserved as-is for reference and backward compatibility.
# New work should use the unified file. This file is not removed.

name: lifeos-automation

x-lifeos-scaffold:
  status: inert-scaffold-only
  service_start_allowed: false
  real_secrets_allowed: false
  notes: "Do not run, pull, build, create, or start containers until explicitly approved."

services:
  n8n:
    image: n8nio/n8n:latest
    profiles:
      - manual-start-disabled
    restart: "no"
    env_file:
      - /home/lifeos/40_Services/secrets/n8n.env
    environment:
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: ${N8N_PORT:-5678}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      GENERIC_TIMEZONE: ${N8N_TIMEZONE:-America/Chicago}
      N8N_USER_FOLDER: ${N8N_USER_FOLDER:-/home/node/.n8n}
      N8N_DIAGNOSTICS_ENABLED: ${N8N_DIAGNOSTICS_ENABLED:-false}
      N8N_PERSONALIZATION_ENABLED: ${N8N_PERSONALIZATION_ENABLED:-false}
      N8N_VERSION_NOTIFICATIONS_ENABLED: ${N8N_VERSION_NOTIFICATIONS_ENABLED:-false}
    ports:
      - "127.0.0.1:${N8N_PORT:-5678}:5678"
    volumes:
      - /home/lifeos/40_Services/data/automation/n8n:/home/node/.n8n
      - /home/lifeos/00_Inbox:/lifeos/inbox:ro
      - /home/lifeos/50_Event_Log:/lifeos/event-log
    labels:
      lifeos.service: n8n
      lifeos.phase: foundation-lock-in
      lifeos.status: scaffold-only
